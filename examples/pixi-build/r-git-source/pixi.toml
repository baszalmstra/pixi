# Building multiple R packages straight from GitHub.
#
# The `pixi-build-r` backend parses each package's upstream `DESCRIPTION`
# file, maps R packages to their conda-forge equivalents (e.g. `cli` ->
# `r-cli`) and builds a conda package via `R CMD INSTALL`. Combined with a
# git source this lets you pull in any R package hosted on GitHub as a
# regular pixi dependency.
#
# Layout:
#   pixi.toml                    <- this file: workspace + consumer
#   packages/r-highr/pixi.toml   <- builds r-highr   from github.com/yihui/highr
#   packages/r-formatr/pixi.toml <- builds r-formatr from github.com/yihui/formatR
#
# Add a third GitHub-hosted R package by dropping another sub-directory
# into `packages/` with its own `pixi.toml` and listing it under
# `[dependencies]` below.

# ---------------------------------------------------------------------------
# Workspace
# ---------------------------------------------------------------------------
[workspace]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
preview = ["pixi-build"]

# ---------------------------------------------------------------------------
# Dependencies: r-base for the runtime, plus each GitHub-sourced R package
# referenced by path. The actual git URL + tag lives in each sub-manifest.
# ---------------------------------------------------------------------------
[dependencies]
# Pin to a single R minor so both source packages build against the same
# r-base (each build pins host-r-base into the resulting package).
r-base = ">=4.5,<4.6"
r-highr = { path = "packages/r-highr" }
r-formatr = { path = "packages/r-formatr" }

# ---------------------------------------------------------------------------
# Tasks: smoke-test that both packages built from GitHub are importable.
# ---------------------------------------------------------------------------
[tasks]
check = """Rscript -e '
  library(highr); library(formatR);
  cat("highr  ", as.character(packageVersion("highr")),   "\\n");
  cat("formatR", as.character(packageVersion("formatR")), "\\n")
'"""
